<style>
  .dark-mode {
    background-color: #242424;
    color: lightgrey;
  }
</style>

<div id="header">
  <p class="text-center">
    <img
      src="https://raw.githubusercontent.com/mpatfield/homebridge-dummy/refs/heads/latest/img/banner.png"
      alt="Homebridge Dummy"
      style="width: 60%;"
    />
  </p>
</div>

<div id="support" class="text-center" style="display: none;">
  <p i18n="support" i18n_replace="github"></p>
</div>

<div id="intro" class="text-center" style="display: none;">
  <p class="lead" i18n="thankYou" i18n_replace="dummy"></p>
  <p class="lead" i18n="migrating"></p>
  <button type="button" class="btn btn-secondary" id="showSettings" i18n="no"></button>&nbsp;&nbsp;
  <button type="button" class="btn btn-secondary" id="showMigration" i18n="yes"></button>
</div>

<div id="migration" class="text-center" style="display: none;">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Achtung.svg/330px-Achtung.svg.png" width="100px"/>
  </br></br>
  <h1><p class="text-danger" i18n="migrationAlert"></p></h1>
  <h1><a target="_blank" href="https://github.com/mpatfield/homebridge-dummy/wiki/Migration" i18n="migrationReadme"><p></p></a></h1>
  <hr/>
  <br/>
  <p class="lead" i18n="migrationAcknowledge" i18n_replace="legacy"></p>
  <p class="lead" i18n="migrationReconfigure" i18n_replace="dummy"></p>
  <br/>
  <button type="button" class="btn btn-primary" id="continue" i18n="continue" i18n_replace="arrow"></button>&nbsp;&nbsp;
</div>

<script src="ui.js?v=__VERSION__"></script>
